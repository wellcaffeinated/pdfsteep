services:
  pdfsteep:
    build: .
    container_name: pdfsteep
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      # paths *inside* the container; both live under /data by default, but
      # can be pointed at the same directory for in-place conversion
      - IN_DIR=${IN_DIR:-/data/in}
      - OUT_DIR=${OUT_DIR:-/data/out}
    volumes:
      - ${DATA_DIR:-./data}:/data
    restart: unless-stopped
